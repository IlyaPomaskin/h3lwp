instructions=To use this app you must provide files from your copy of Heroes 3.\n\
Due to copyright restrictions, we can't provide these files.\n \
Only Heroes 3 SoD and Complete versions are supported. HD Edition will not work.\n \
Open the game folder on PC, find a folder named "Data", and upload a file named "h3sprite.lod" to your phone.\n \
Optionally, if you have Horn of the Abyss installed, also upload "HotA.lod" from the same "Data" folder to enable HotA content.

